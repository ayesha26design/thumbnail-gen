function ldImg(s){return new Promise(r=>{if(!s)return r(null);const i=new Image();i.crossOrigin="anonymous";i.onload=()=>r(i);i.onerror=()=>r(null);i.src=s;});}
function ldFlag(src){if(!src)return Promise.resolve(null);if(src.startsWith("data:"))return ldImg(src);return fetch(src).then(r=>r.text()).then(svg=>ldImg("data:image/svg+xml,"+encodeURIComponent(svg))).catch(()=>ldImg(src));}

const LS={lbl:{fontSize:11,color:"#666",fontWeight:600,marginBottom:3,display:"block"},inp:{width:"100%",padding:"8px 10px",borderRadius:7,border:"1px solid #2a2a2a",background:"#111",color:"#fff",fontSize:13,fontWeight:700,boxSizing:"border-box",textTransform:"uppercase",outline:"none"}};

function Slider({label,value,min,max,unit,onChange}){
  return(<div><div style={{display:"flex",justifyContent:"space-between",marginBottom:2}}><span style={{fontSize:10,color:"#555"}}>{label}</span><span style={{fontSize:10,color:"#00d4aa"}}>{value}{unit||""}</span></div><input type="range" min={min} max={max} value={value} onChange={e=>onChange(+e.target.value)} style={{width:"100%",accentColor:"#00d4aa"}}/></div>);
}

function ColorPicker({value,onChange,label}){
  const [open,setOpen]=useState(false);
  const [hue,setHue]=useState(0),[sat,setSat]=useState(100),[bri,setBri]=useState(50);
  const specRef=useRef(null),drag=useRef(false);
  function hsbToHex(h,s,b){s/=100;b/=100;const k=n=>(n+h/60)%6;const f=n=>b*(1-s*Math.max(0,Math.min(k(n),4-k(n),1)));return"#"+[f(5),f(3),f(1)].map(x=>Math.round(x*255).toString(16).padStart(2,"0")).join("");}
  function hexToHsb(hex){let c=(hex||"").replace("#","");if(c.length===3)c=c.split("").map(x=>x+x).join("");if(c.length!==6)return[0,100,50];const r=parseInt(c.slice(0,2),16)/255,g=parseInt(c.slice(2,4),16)/255,b=parseInt(c.slice(4,6),16)/255;const max=Math.max(r,g,b),d=max-Math.min(r,g,b);let h=0;if(d){if(max===r)h=(g-b)/d%6;else if(max===g)h=(b-r)/d+2;else h=(r-g)/d+4;h=Math.round(h*60);if(h<0)h+=360;}return[h,Math.round(max===0?0:d/max*100),Math.round(max*100)];}
  useEffect(()=>{if(!value)return;const[h,s,b]=hexToHsb(value);setHue(h);setSat(s);setBri(b);},[value]);
  const apply=(h,s,b)=>onChange(hsbToHex(h,s,b));
  const pick=e=>{if(!specRef.current)return;const rc=specRef.current.getBoundingClientRect();const s=Math.max(0,Math.min(100,(((e.touches?e.touches[0].clientX:e.clientX)-rc.left)/rc.width)*100));const b=Math.max(0,Math.min(100,100-(((e.touches?e.touches[0].clientY:e.clientY)-rc.top)/rc.height)*100));setSat(Math.round(s));setBri(Math.round(b));apply(hue,Math.round(s),Math.round(b));};
  const sw=["#FFFFFF","#000000","#FF0000","#FF6B00","#FFD700","#00FF00","#00D4AA","#0099FF","#013CFE","#8B00FF","#FF00FF","#FF0080","#888888"];
  return(
    <div style={{position:"relative"}}>
      {label&&<label style={LS.lbl}>{label}</label>}
      <div onClick={()=>setOpen(o=>!o)} style={{display:"flex",alignItems:"center",gap:6,padding:"6px 8px",borderRadius:7,border:"1px solid #2a2a2a",background:"#111",cursor:"pointer"}}>
        <div style={{width:20,height:20,borderRadius:4,background:value||"#000",border:"1px solid #444",flexShrink:0}}/>
        <span style={{fontSize:11,color:"#aaa",fontFamily:"monospace",flex:1}}>{(value||"#000000").toUpperCase()}</span>
        <span style={{fontSize:9,color:"#444"}}>{open?"▲":"▼"}</span>
      </div>
      {open&&(
        <div style={{position:"absolute",top:"100%",left:0,right:0,zIndex:300,background:"#181818",border:"1px solid #333",borderRadius:10,padding:10,marginTop:4,boxShadow:"0 8px 32px rgba(0,0,0,0.8)"}}>
          <div ref={specRef} style={{width:"100%",height:120,borderRadius:6,background:`linear-gradient(to bottom,transparent,#000),linear-gradient(to right,#fff,hsl(${hue},100%,50%))`,position:"relative",cursor:"crosshair",marginBottom:8,touchAction:"none"}}
            onMouseDown={e=>{drag.current=true;pick(e);}} onMouseMove={e=>{if(drag.current)pick(e);}} onMouseUp={()=>drag.current=false} onMouseLeave={()=>drag.current=false}
            onTouchStart={e=>{drag.current=true;pick(e);}} onTouchMove={e=>{if(drag.current)pick(e);}} onTouchEnd={()=>drag.current=false}>
            <div style={{position:"absolute",transform:"translate(-50%,-50%)",left:sat+"%",top:(100-bri)+"%",width:12,height:12,borderRadius:6,border:"2px solid #fff",boxShadow:"0 0 0 1px #000",pointerEvents:"none"}}/>
          </div>
          <div style={{position:"relative",height:12,borderRadius:6,background:"linear-gradient(to right,#f00,#ff0,#0f0,#0ff,#00f,#f0f,#f00)",marginBottom:8}}>
            <input type="range" min={0} max={360} value={hue} onChange={e=>{const h=+e.target.value;setHue(h);apply(h,sat,bri);}} style={{position:"absolute",inset:0,width:"100%",opacity:0,cursor:"pointer",height:"100%",margin:0}}/>
            <div style={{position:"absolute",top:"50%",transform:"translate(-50%,-50%)",left:(hue/360*100)+"%",width:12,height:12,borderRadius:6,background:`hsl(${hue},100%,50%)`,border:"2px solid #fff",boxShadow:"0 0 0 1px #000",pointerEvents:"none"}}/>
          </div>
          <div style={{display:"flex",gap:4,flexWrap:"wrap",marginBottom:8}}>{sw.map(c=><div key={c} onClick={()=>{onChange(c);const[h,s,b]=hexToHsb(c);setHue(h);setSat(s);setBri(b);}} style={{width:20,height:20,borderRadius:3,background:c,cursor:"pointer",border:value===c?"2px solid #00d4aa":"1px solid #444"}}/>)}</div>
          <button onClick={()=>setOpen(false)} style={{width:"100%",padding:"5px 0",borderRadius:5,border:"none",background:"#00d4aa",color:"#000",fontWeight:700,fontSize:11,cursor:"pointer"}}>Done</button>
        </div>
      )}
    </div>
  );
}

function Sec({title,icon,id,open,toggle,children}){
  return(
    <div style={{borderBottom:"1px solid #1a1a1a"}}>
      <div onClick={()=>toggle(id)} style={{display:"flex",justifyContent:"space-between",alignItems:"center",padding:"9px 12px",cursor:"pointer",background:open?"#111":"transparent"}}>
        <span style={{fontSize:11,fontWeight:700,color:open?"#00d4aa":"#777"}}>{icon} {title}</span>
        <span style={{fontSize:9,color:"#444"}}>{open?"▲":"▼"}</span>
      </div>
      {open&&<div style={{padding:"10px 12px",display:"flex",flexDirection:"column",gap:9}}>{children}</div>}
    </div>

}

function PwModal({onOk,onCancel}){
  const [pw,setPw]=useState(""),err=useRef(false);
  const [,re]=useState(0);
  const go=()=>{if(pw===SETUP_PASSWORD)onOk();else{err.current=true;setPw("");re(n=>n+1);}};
  return(
    <div style={{position:"fixed",inset:0,background:"rgba(0,0,0,0.85)",zIndex:999,display:"flex",alignItems:"center",justifyContent:"center"}}>
      <div style={{background:"#141414",border:"1px solid #2a2a2a",borderRadius:14,padding:28,width:300,display:"flex",flexDirection:"column",gap:14}}>
        <div style={{textAlign:"center"}}><div style={{fontSize:28,marginBottom:4}}>🔒</div><div style={{fontSize:15,fontWeight:800,color:"#fff"}}>Setup Mode</div><div style={{fontSize:12,color:"#555",marginTop:2}}>Enter admin password</div></div>
        <input type="password" value={pw} autoFocus onChange={e=>{setPw(e.target.value);err.current=false;re(n=>n+1);}} onKeyDown={e=>e.key==="Enter"&&go()} placeholder="Password"
          style={{padding:"10px 12px",borderRadius:8,border:err.current?"1px solid #f44":"1px solid #2a2a2a",background:"#0a0a0a",color:"#fff",fontSize:14,outline:"none",textAlign:"center",letterSpacing:3}}/>
        {err.current&&<p style={{color:"#f44",fontSize:11,textAlign:"center",margin:"-8px 0 0"}}>Incorrect password</p>}
        <div style={{display:"flex",gap:8}}>
          <button onClick={onCancel} style={{flex:1,padding:"9px 0",borderRadius:8,border:"1px solid #222",background:"transparent",color:"#555",fontSize:13,cursor:"pointer"}}>Cancel</button>
          <button onClick={go} style={{flex:2,padding:"9px 0",borderRadius:8,border:"none",background:"linear-gradient(135deg,#00d4aa,#7028f5)",color:"#fff",fontSize:13,fontWeight:700,cursor:"pointer"}}>Unlock</button>
        </div>
      </div>
    </div>
  );
}

function App(){
  const [tab,setTab]=useState("generator");
  const [pwModal,setPwModal]=useState(false);
  const [admin,setAdmin]=useState(false);

  const [line1,setL1]=useState("CREATOR NAME");
  const [line2,setL2]=useState("");
  const [secText,setSecText]=useState("");
  const [strokeCol,setStroke]=useState("#013CFE");
  const [fillCol,setFill]=useState("#FFFFFF");
  const [titleSize,setTSize]=useState(40);
  const [strokeW,setStrokeW]=useState(6);
  const [letterSp,setLetterSp]=useState(0);
  const [lineH,setLineH]=useState(91);
  const [titleY,setTitleY]=useState(0);
  const [secSize,setSecSize]=useState(16);
  const [secCol,setSecCol]=useState("#FFFFFF");
  const [secX,setSecX]=useState(0);
  const [secY,setSecY]=useState(0);

  const [creatorSrc,setCreator]=useState(null);
  const [zoom,setZoom]=useState(100);
  const [posX,setPosX]=useState(0);
  const [posY,setPosY]=useState(0);

  const [flagSrc,setFlagSrc]=useState(null);
  const [flagLabel,setFlagLabel]=useState("");
  const [flagSearch,setFlagSearch]=useState("");
  const [flagOpen,setFlagOpen]=useState(false);
  const [showFlag,setShowFlag]=useState(false);

  const [bgSrc,setBg]=useState(null);
  const [bgList,setBgList]=useState([]);
  const [btnSrc,setBtn]=useState(null);
  const [btnList,setBtnList]=useState([]);
  const [creators,setCreators]=useState([]);
  const [libSearch,setLibSearch]=useState("");
  const [libLoading,setLibLoading]=useState(true);

  const [fontLoaded,setFontLoaded]=useState(false);
  const [secFontLoaded,setSecFontLoaded]=useState(false);
  const fontRef2=useRef("Impact");
  const secFontRef2=useRef("Arial");

  const [exporting,setExporting]=useState(false);
  const [expMsg,setExpMsg]=useState("");
  const [expScale,setExpScale]=useState(2);
  const [expFmt,setExpFmt]=useState("png");
  const [jpegQ,setJpegQ]=useState(0.8);

  const [openSec,setOpenSec]=useState("creator");
  const toggle=id=>setOpenSec(p=>p===id?null:id);

  const canvasRef=useRef(null),bgFileRef=useRef(null),btnFileRef=useRef(null);
  const crFileRef=useRef(null),fontFileRef=useRef(null),secFontFileRef=useRef(null),flagFileRef=useRef(null);

  const ready=!!(bgSrc&&(btnSrc||btnList.length>0));
  const filteredCreators=creators.filter(x=>x.name.toLowerCase().includes(libSearch.toLowerCase()));

  useEffect(()=>{
    (async()=>{
      try{const r=await window.storage.get("creators");if(r?.value)setCreators(JSON.parse(r.value));}catch(e){}
      try{const r=await window.storage.get("bg-list");if(r?.value){const d=JSON.parse(r.value);setBgList(d);if(d.length>0)setBg(d[Math.min(13,d.length-1)].src);}}catch(e){}
      try{const r=await window.storage.get("btn-list");if(r?.value){const d=JSON.parse(r.value);setBtnList(d);if(d.length>0)setBtn(d[Math.min(2,d.length-1)].src);}}catch(e){}
      setLibLoading(false);
    })();
  },[]);
  useEffect(()=>{if(libLoading)return;window.storage.set("creators",JSON.stringify(creators)).catch(()=>{});},[creators,libLoading]);
  useEffect(()=>{if(libLoading)return;window.storage.set("bg-list",JSON.stringify(bgList)).catch(()=>{});},[bgList,libLoading]);
  useEffect(()=>{if(libLoading)return;window.storage.set("btn-list",JSON.stringify(btnList)).catch(()=>{});},[btnList,libLoading]);

  const loadFont=e=>{const f=e.target.files?.[0];if(!f)return;f.arrayBuffer().then(b=>new FontFace("TrimBold",b).load()).then(fc=>{document.fonts.add(fc);fontRef2.current="TrimBold";setFontLoaded(true);}).catch(()=>{});};
  const loadSecFont=e=>{const f=e.target.files?.[0];if(!f)return;f.arrayBuffer().then(b=>new FontFace("SecFont",b).load()).then(fc=>{document.fonts.add(fc);secFontRef2.current="SecFont";setSecFontLoaded(true);}).catch(()=>{});};

  const draw=useCallback((canvas,scale)=>{
    if(!canvas||!ready)return Promise.resolve();
    const s=scale||1,W=P.frame.w*s,H=P.frame.h*s;
    canvas.width=W;canvas.height=H;
    const ctx=canvas.getContext("2d");ctx.clearRect(0,0,W,H);
    const btn2=btnSrc||(btnList[0]?.src)||null;
    const fn=fontRef2.current,sfn=secFontRef2.current;
    return Promise.all([ldImg(bgSrc),ldImg(creatorSrc),ldImg(btn2),ldFlag(flagSrc)]).then(([bg,cr,btn,fl])=>{
      if(bg)ctx.drawImage(bg,0,0,W,H);
      if(cr){
        ctx.save();ctx.beginPath();ctx.rect(P.creatorMask.x*s,P.creatorMask.y*s,P.creatorMask.w*s,P.creatorMask.h*s);ctx.clip();
        const tw=P.creatorMask.w*s,th=P.creatorMask.h*s,zf=zoom/100,sc=Math.max(tw/cr.width,th/cr.height)*zf;
        ctx.drawImage(cr,P.creatorMask.x*s+(tw-cr.width*sc)/2+(posX*s),P.creatorMask.y*s+(th-cr.height*sc)/2+(posY*s),cr.width*sc,cr.height*sc);
        ctx.restore();
      }
      ctx.textAlign="center";ctx.textBaseline="top";
      const lines=[line1,line2].filter(l=>l.trim());
      let fs0=titleSize*s,lhF=lineH/100,totH=lines.length*fs0*lhF,cx=P.title.cx*s;
      let sy=(P.title.y+titleY)*s+((P.title.h*s-totH)/2);
      ctx.letterSpacing=(letterSp*s)+"px";
      lines.forEach(l=>{
        let t=l.toUpperCase(),fs=fs0;
        ctx.font=`900 ${fs}px ${fn},Impact,Arial Black,sans-serif`;
        const tw2=ctx.measureText(t).width,mw=P.title.w*s;
        if(tw2>mw){fs*=mw/tw2;ctx.font=`900 ${fs}px ${fn},Impact,Arial Black,sans-serif`;}
        ctx.strokeStyle=strokeCol;ctx.lineWidth=strokeW*s;ctx.lineJoin="round";ctx.miterLimit=2;
        ctx.strokeText(t,cx,sy);ctx.fillStyle=fillCol;ctx.fillText(t,cx,sy);sy+=fs*lhF;
      });
      ctx.letterSpacing="0px";
      if(showFlag&&fl){
        const fw=P.flag.w*s,fh=P.flag.h*s,fx=P.flag.cx*s-fw/2,fy=P.flag.y*s,sw2=1.5*s,r=3*s;
        ctx.save();ctx.fillStyle="#FFF";ctx.beginPath();
        const[bx,by,bw,bh,br]=[fx-sw2,fy-sw2,fw+sw2*2,fh+sw2*2,r+sw2];
        ctx.moveTo(bx+br,by);ctx.lineTo(bx+bw-br,by);ctx.quadraticCurveTo(bx+bw,by,bx+bw,by+br);ctx.lineTo(bx+bw,by+bh-br);ctx.quadraticCurveTo(bx+bw,by+bh,bx+bw-br,by+bh);ctx.lineTo(bx+br,by+bh);ctx.quadraticCurveTo(bx,by+bh,bx,by+bh-br);ctx.lineTo(bx,by+br);ctx.quadraticCurveTo(bx,by,bx+br,by);ctx.closePath();ctx.fill();ctx.restore();
        ctx.save();ctx.beginPath();ctx.moveTo(fx+r,fy);ctx.lineTo(fx+fw-r,fy);ctx.quadraticCurveTo(fx+fw,fy,fx+fw,fy+r);ctx.lineTo(fx+fw,fy+fh-r);ctx.quadraticCurveTo(fx+fw,fy+fh,fx+fw-r,fy+fh);ctx.lineTo(fx+r,fy+fh);ctx.quadraticCurveTo(fx,fy+fh,fx,fy+fh-r);ctx.lineTo(fx,fy+r);ctx.quadraticCurveTo(fx,fy,fx+r,fy);ctx.closePath();ctx.clip();ctx.drawImage(fl,fx,fy,fw,fh);ctx.restore();
      }else if(secText.trim()){
        ctx.font=`400 ${secSize*s}px ${sfn},Arial,sans-serif`;ctx.textAlign="center";ctx.textBaseline="top";ctx.letterSpacing="0px";ctx.fillStyle=secCol;
        ctx.fillText(secText,(P.flag.cx+secX)*s,(P.flag.y+secY)*s);
      }
      if(btn)ctx.drawImage(btn,P.button.x*s,P.button.y*s,P.button.w*s,P.button.h*s);
    });
  },[bgSrc,creatorSrc,btnSrc,btnList,flagSrc,showFlag,line1,line2,secText,strokeCol,fillCol,titleSize,strokeW,letterSp,lineH,titleY,secSize,secCol,secX,secY,zoom,posX,posY,ready,fontLoaded,secFontLoaded]);

  useEffect(()=>{if(canvasRef.current&&ready)draw(canvasRef.current,PS);},[draw,ready]);

  const doExport=()=>{
    setExporting(true);setExpMsg("");
    const c=document.createElement("canvas");
    draw(c,expScale).then(()=>new Promise(r=>setTimeout(r,400))).then(()=>{
      try{
        let out=c;
        if(expFmt==="jpeg"){const t=document.createElement("canvas");t.width=c.width;t.height=c.height;const x=t.getContext("2d");x.fillStyle="#000";x.fillRect(0,0,t.width,t.height);x.drawImage(c,0,0);out=t;}
        const du=out.toDataURL(expFmt==="jpeg"?"image/jpeg":"image/png",expFmt==="jpeg"?jpegQ:undefined);
        const a=document.createElement("a");a.download=(line1+(line2?"_"+line2:"")+(expFmt==="jpeg"?".jpg":".png")).replace(/\s+/g,"_");
        a.href=du;document.body.appendChild(a);a.click();document.body.removeChild(a);
        setExpMsg("✓ "+out.width+"×"+out.height);
      }catch(e){setExpMsg("Failed");}
      setExporting(false);
    });
  };

      title:{

        strokeWidth:strokeW,

        lineHeight:lineH,
        verticalOffset:titleY,
        strokeColor:strokeCol,
        fillColor:fillCol,

    };
    const a=document.createElement("a");
    a.href=URL.createObjectURL(new Blob([JSON.stringify(config,null,2)],{type:"application/json"}));
    a.download="thumbnail-config.json";

  const exportPreloaded=()=>{
    const src=document.documentElement.outerHTML;
    const bgJ=JSON.stringify(JSON.stringify(bgList));
    const btnJ=JSON.stringify(JSON.stringify(btnList));
    const crJ=JSON.stringify(JSON.stringify(creators));
    const script=`<script id="__preload__">(function(){try{localStorage.setItem('bg-list',${bgJ});}catch(e){}try{localStorage.setItem('btn-list',${btnJ});}catch(e){}try{localStorage.setItem('creators',${crJ});}catch(e){}})()</scr`+`ipt>`;
    const html=src.replace("</body>",script+"\n</body>");
    const a=document.createElement("a");
    a.href=URL.createObjectURL(new Blob([html],{type:"text/html"}));
    a.download="index.html";document.body.appendChild(a);a.click();document.body.removeChild(a);
  };

                  </div>
                  <div style={{flex:1}}><span style={{fontSize:9,color:"#444",display:"block",marginBottom:2,textTransform:"uppercase"}}>Scale</span>
                    <div style={{display:"flex",gap:2}}>{[{s:1,l:"1×"},{s:2,l:"2×"},{s:3,l:"3×"}].map(o=><button key={o.s} onClick={()=>setExpScale(o.s)} style={{flex:1,padding:"4px 0",borderRadius:5,fontSize:10,fontWeight:700,cursor:"pointer",border:expScale===o.s?"2px solid #00d4aa":"1px solid #222",background:expScale===o.s?"#0a201a":"#111",color:expScale===o.s?"#00d4aa":"#555"}}>{o.l}</button>)}</div>
                  </div>
                </div>
                {expFmt==="jpeg"&&<div><span style={{fontSize:9,color:"#444"}}>Quality {Math.round(jpegQ*100)}%</span><input type="range" min={30} max={100} value={Math.round(jpegQ*100)} onChange={e=>setJpegQ(+e.target.value/100)} style={{width:"100%",accentColor:"#00d4aa"}}/></div>}
                <p style={{fontSize:9,color:"#333",margin:0,textAlign:"center"}}>{P.frame.w*expScale}×{P.frame.h*expScale}px</p>
                <button onClick={doExport} disabled={exporting} style={{width:"100%",padding:"9px 0",borderRadius:8,border:"none",background:exporting?"#222":"linear-gradient(135deg,#00d4aa,#7028f5)",color:exporting?"#555":"#fff",fontSize:13,fontWeight:800,cursor:exporting?"wait":"pointer",opacity:exporting?0.6:1}}>
                  {exporting?"Exporting…":"⬇ Export "+expFmt.toUpperCase()}
                </button>
                {expMsg&&<p style={{textAlign:"center",fontSize:11,color:expMsg.startsWith("✓")?"#00d4aa":"#f44",margin:0}}>{expMsg}</p>}
              </div>
            </>
          ):(
            <div style={{textAlign:"center",padding:20}}>
              <div style={{fontSize:32,marginBottom:8}}>⏳</div>
              <p style={{fontWeight:700,color:"#666",marginBottom:4,fontSize:13}}>Not ready yet</p>
              <p style={{fontSize:11,color:"#444",lineHeight:1.5}}>Go to <strong style={{color:"#00d4aa"}}>⚙️ Setup</strong><br/>and upload your assets</p>
            </div>

        </div>

        {/* Right — controls */}

            {filteredCreators.length===0

                    <div style={{width:"100%",aspectRatio:"1",borderRadius:8,overflow:"hidden",border:creatorSrc===it.src?"2px solid #00d4aa":"2px solid #222"}}>

                    <span style={{fontSize:9,color:creatorSrc===it.src?"#00d4aa":"#666",textAlign:"center",overflow:"hidden",textOverflow:"ellipsis",whiteSpace:"nowrap",width:"100%"}}>{it.name}</span>

            <ColorPicker label="Stroke Color" value={strokeCol} onChange={setStroke}/>
            <ColorPicker label="Fill Color" value={fillCol} onChange={setFill}/>
            <Slider label="Font Size" value={titleSize} min={16} max={72} unit="px" onChange={setTSize}/>

            <Slider label="Letter Spacing" value={letterSp} min={-5} max={20} unit="px" onChange={setLetterSp}/>
            <Slider label="Line Height" value={lineH} min={60} max={140} unit="%" onChange={setLineH}/>
            <Slider label="Vertical Offset" value={titleY} min={-100} max={100} unit="px" onChange={setTitleY}/>
            <button onClick={()=>{setTSize(40);setStrokeW(6);setLetterSp(0);setLineH(91);setTitleY(0);setFill("#FFFFFF");}} style={{alignSelf:"flex-end",padding:"4px 10px",borderRadius:5,border:"1px solid #222",background:"#0a0a0a",color:"#555",fontSize:10,cursor:"pointer"}}>Reset</button>
          </Sec>

          <Sec title="Secondary / Flag" icon="🏷️" id="sec" open={openSec==="sec"} toggle={toggle}>

          {btnList.length>1&&(

            </div>
            {btnList.length>0&&<button onClick={()=>btnFileRef.current?.click()} style={{padding:"5px 12px",borderRadius:6,border:"1px solid #333",background:"#111",color:"#00d4aa",fontSize:11,cursor:"pointer"}}>+ Add more</button>}

          </div>

          {[
            {ref:fontFileRef,label:"4. Title Font (Trim Bold)",loaded:fontLoaded,onChange:loadFont},
            {ref:secFontFileRef,label:"5. Secondary Font (optional, default Arial)",loaded:secFontLoaded,onChange:loadSecFont},

            <div key={i} style={{marginBottom:14}}>
              <label style={{fontSize:13,fontWeight:700,color:it.loaded?"#00d4aa":"#888",display:"block",marginBottom:5}}>{it.loaded?"✓ ":""}{it.label}</label>
              <div onClick={()=>it.ref.current?.click()} style={{padding:12,borderRadius:8,textAlign:"center",cursor:"pointer",background:"#111",border:it.loaded?"2px solid #00d4aa":"2px dashed #2a2a2a",color:it.loaded?"#00d4aa":"#444",fontSize:12}}>

              </div>
              <input ref={it.ref} type="file" accept=".ttf,.otf,.woff,.woff2" onChange={it.onChange} style={{display:"none"}}/>
            </div>
          ))}

          <div style={{padding:"12px 14px",borderRadius:10,background:ready?"#0a201a":"#111",border:ready?"1px solid #00d4aa":"1px solid #2a2a2a",textAlign:"center",marginBottom:40}}>
            <span style={{fontSize:13,fontWeight:700,color:ready?"#00d4aa":"#555"}}>{ready?"✓ Setup complete — Generator is ready":"Upload backgrounds & buttons to continue"}</span>
          </div>
        </div>
      )}

      {pwModal&&<PwModal onOk={()=>{setAdmin(true);setTab("setup");setPwModal(false);}} onCancel={()=>setPwModal(false)}/>}
      <input ref={flagFileRef} type="file" accept="image/*" onChange={e=>{const f=e.target.files?.[0];if(!f)return;const r=new FileReader();r.onload=ev=>{setFlagSrc(ev.target.result);setFlagLabel(f.name.replace(/\.[^.]+$/,""));setFlagOpen(false);};r.readAsDataURL(f);}} style={{display:"none"}}/>
      {flagOpen&&<div onClick={()=>setFlagOpen(false)} style={{position:"fixed",inset:0,zIndex:99}}/>}
    </div>
  );
}

ReactDOM.createRoot(document.getElementById("root")).render(<App/>);
</script>
</body>
</html>
