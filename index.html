      function ColorPicker({value,onChange,label}){
        const [open,setOpen]=useState(false);
        const [hex,setHex]=useState((value||"#000000").replace("#",""));
        const [hue,setHue]=useState(0);
        const [sat,setSat]=useState(100);
        const [bri,setBri]=useState(50);
        const specRef=useRef(null);
        const dragRef=useRef(false);
        function hsbToHex(h,s,b){s/=100;b/=100;const k=n=>(n+h/60)%6;const f=n=>b*(1-s*Math.max(0,Math.min(k(n),4-k(n),1)));const r=Math.round(f(5)*255),g=Math.round(f(3)*255),bl=Math.round(f(1)*255);return"#"+[r,g,bl].map(x=>x.toString(16).padStart(2,"0")).join("");}
        function hexToHsb(h){let c=(h||"").replace("#","");if(c.length===3)c=c.split("").map(x=>x+x).join("");if(c.length!==6)return[0,100,50];const r=parseInt(c.slice(0,2),16)/255,g=parseInt(c.slice(2,4),16)/255,b=parseInt(c.slice(4,6),16)/255;const max=Math.max(r,g,b),min=Math.min(r,g,b),d=max-min;let hv=0;const sv=max===0?0:d/max,v=max;if(d!==0){if(max===r)hv=(g-b)/d%6;else if(max===g)hv=(b-r)/d+2;else hv=(r-g)/d+4;hv=Math.round(hv*60);if(hv<0)hv+=360;}return[hv,Math.round(sv*100),Math.round(v*100)];}
        useEffect(()=>{if(!value)return;const[h,s,b]=hexToHsb(value);setHue(h);setSat(s);setBri(b);setHex(value.replace("#",""));},[value]);
        const applyHsb=(h,s,b)=>{const col=hsbToHex(h,s,b);setHex(col.replace("#",""));onChange(col);};

      function App(){
        const [activeTab,setActiveTab]=useState("generator");
        const [showPwModal,setShowPwModal]=useState(false);
        const [isAdminUnlocked,setAdminUnlocked]=useState(false);
        const handleTabClick=tab=>{if(tab==="generator"){setActiveTab("generator");}else{if(isAdminUnlocked){setActiveTab("setup");}else{setShowPwModal(true);}}};
        const onPwSuccess=()=>{setShowPwModal(false);setAdminUnlocked(true);setActiveTab("setup");};

        const [line1,sL1]=useState("GRACE HAYDEN");

        const [secondaryText,sSecT]=useState("");

        const [secXOffset,setSXO]=useState(0);
        const [creatorSrc,sCS]=useState(null);
        const [imgX,sIX]=useState(0),[imgY,sIY]=useState(0),[imgZoom,sIZ]=useState(100);
        const [flagSrc,sFS]=useState(null),[flagLabel,sFL]=useState(""),[flagSearch,sFSr]=useState("");
        const [flagOpen,sFO]=useState(false),[showFlag,sSF]=useState(false);

        const canvasRef=useRef(null),bgRef=useRef(null),btnRef=useRef(null);

        const allReady=!!(bgSrc&&(btnSrc||btnOptions.length>0));

        useEffect(()=>{if(libLoading)return;window.storage.set("bg-library",JSON.stringify(bgOptions)).catch(()=>{});},[bgOptions,libLoading]);
        useEffect(()=>{if(libLoading)return;window.storage.set("btn-library",JSON.stringify(btnOptions)).catch(()=>{});},[btnOptions,libLoading]);

        const handleFont=e=>{const f=e.target.files&&e.target.files[0];if(!f)return;f.arrayBuffer().then(b=>{const fc=new FontFace("TrimBold",b);return fc.load();}).then(fc=>{document.fonts.add(fc);fontNameRef.current="TrimBold";sFL2(true);}).catch(()=>{});};
        const handleSecFont=e=>{const f=e.target.files&&e.target.files[0];if(!f)return;f.arrayBuffer().then(b=>{const fc=new FontFace("SecondaryFont",b);return fc.load();}).then(fc=>{document.fonts.add(fc);secFontNameRef.current="SecondaryFont";sSecFL(true);}).catch(()=>{});};

        const draw=useCallback((canvas,scale)=>{
          if(!canvas||!allReady)return Promise.resolve();
          const s=scale||1,W=P.frame.w*s,H=P.frame.h*s;
          canvas.width=W;canvas.height=H;

              ctx.save();ctx.beginPath();ctx.moveTo(fx+r,fy);ctx.lineTo(fx+fw-r,fy);ctx.quadraticCurveTo(fx+fw,fy,fx+fw,fy+r);ctx.lineTo(fx+fw,fy+fh-r);ctx.quadraticCurveTo(fx+fw,fy+fh,fx+fw-r,fy+fh);ctx.lineTo(fx+r,fy+fh);ctx.quadraticCurveTo(fx,fy+fh,fx,fy+fh-r);ctx.lineTo(fx,fy+r);ctx.quadraticCurveTo(fx,fy,fx+r,fy);ctx.closePath();ctx.clip();

                  <label style={{fontSize:13,fontWeight:700,color:fontLoaded?"#00d4aa":"#888",display:"block",marginBottom:5}}>{fontLoaded?"✓ ":""}4. Title Font (Trim Bold)</label>
                  <div onClick={()=>fontRef.current&&fontRef.current.click()} style={{padding:12,borderRadius:8,textAlign:"center",cursor:"pointer",background:"#111",border:fontLoaded?"2px solid #00d4aa":"2px dashed #2a2a2a",color:fontLoaded?"#00d4aa":"#444",fontSize:12}}>
                    {fontLoaded?"✓ Trim Bold loaded":"Click to upload .ttf / .otf / .woff2"}
                  </div>
                  <input ref={fontRef} type="file" accept=".ttf,.otf,.woff,.woff2" onChange={handleFont} style={{display:"none"}}/>
                </div>

                <div style={{marginBottom:24}}>
                  <label style={{fontSize:13,fontWeight:700,color:secFontLoaded?"#00d4aa":"#888",display:"block",marginBottom:5}}>{secFontLoaded?"✓ ":""}5. Secondary Font (optional, default Arial)</label>
                  <div onClick={()=>secFontRef.current&&secFontRef.current.click()} style={{padding:12,borderRadius:8,textAlign:"center",cursor:"pointer",background:"#111",border:secFontLoaded?"2px solid #00d4aa":"2px dashed #2a2a2a",color:secFontLoaded?"#00d4aa":"#444",fontSize:12}}>
                    {secFontLoaded?"✓ Font loaded":"Click to upload .ttf / .otf / .woff2"}
                  </div>
                  <input ref={secFontRef} type="file" accept=".ttf,.otf,.woff,.woff2" onChange={handleSecFont} style={{display:"none"}}/>
                </div>

                <div style={{padding:"12px 14px",borderRadius:10,background:allReady?"#0a201a":"#111",border:allReady?"1px solid #00d4aa":"1px solid #2a2a2a",textAlign:"center"}}>
                  {allReady
                    ?<span style={{color:"#00d4aa",fontSize:13,fontWeight:700}}>✓ Setup complete — Generator is ready</span>
                    :<span style={{color:"#555",fontSize:12}}>Upload backgrounds and buttons to enable the generator</span>}
                </div>
              </div>
            )}

            {showPwModal&&<PasswordModal onSuccess={onPwSuccess} onCancel={()=>setShowPwModal(false)}/>}
            <input ref={flRef} type="file" accept="image/*" onChange={e=>rdFile(e).then(d=>{if(d){sFS(d);sFL(e.target.files[0].name.replace(/\.[^.]+$/,""));sFO(false);}})} style={{display:"none"}}/>
            {flagOpen&&<div onClick={()=>sFO(false)} style={{position:"fixed",inset:0,zIndex:99}}/>}
          </div>
        );
      }

      ReactDOM.createRoot(document.getElementById("root")).render(<App/>);
    </script>
  </body>
</html>
